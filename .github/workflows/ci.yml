name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Syntax check all files
        run: |
          for f in server.js config/db.js config/jwt.js middleware/auth.js middleware/errorHandler.js models/User.js controllers/authController.js controllers/userController.js routes/auth.js routes/user.js; do
            node --check $f && echo "✅ $f"
          done

  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.onrender.com
      - run: test -f dist/index.html && echo "✅ Build succeeded"

  all-green:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All checks passed"
